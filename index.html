<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孙千 - 照片墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8f8f8;
            color: #333;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #e74c3c;
        }
        .header p {
            font-size: 1.1rem;
            color: #666;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .photo-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .photo-card:hover {
            transform: translateY(-5px);
        }
        .photo-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }
        .photo-info {
            padding: 15px;
        }
        .photo-info h3 {
            margin-bottom: 8px;
            font-size: 1.2rem;
        }
        .photo-info p {
            color: #777;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>孙千</h1>
        <p>演员 | 代表作：《风吹半夏》《十九层》</p>
    </div>

    <div class="gallery" id="gallery">
        <!-- 照片由 JavaScript 动态加载 -->
    </div>

    <div class="footer">
        <p>© 2026 孙千照片展示站 | 仅供粉丝交流</p>
    </div>

    <script>
        // 照片数据（这里使用了公开图床示例，实际部署建议使用自有图床）
        const photos = [
            {
                url: "https://p3.itc.cn/q_70/images03/20230323/6f5f5f3f8c0c4c0b8f0f8f8f8f8f8f8f.jpeg",
                title: "红毯造型",
                desc: "某次颁奖典礼红毯现场"
            },
            {
                url: "https://p3.itc.cn/q_70/images03/20230323/6f5f5f3f8c0c4c0b8f0f8f8f8f8f8f8f.jpeg",
                title: "日常随拍",
                desc: "私下生活照"
            },
            {
                url: "https://p3.itc.cn/q_70/images03/20230323/6f5f5f3f8c0c4c0b8f0f8f8f8f8f8f8f.jpeg",
                title: "杂志大片",
                desc: "时尚杂志拍摄"
            }
        ];

        const gallery = document.getElementById('gallery');
        
        photos.forEach(photo => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.innerHTML = `
                <img src="${photo.url}" alt="${photo.title}" loading="lazy">
                <div class="photo-info">
                    <h3>${photo.title}</h3>
                    <p>${photo.desc}</p>
                </div>
            `;
            gallery.appendChild(card);
        });
    </script>
</body>
</html>
